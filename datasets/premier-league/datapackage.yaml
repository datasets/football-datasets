---
name: english-premier-league
title: English Premier League (football)
description: This dataset provides comprehensive statistical data on EPL matches starting
  from the 1993/1994 season up to the current season, with daily updates to ensure
  the most accurate and timely results.
collection: football
licenses:
- name: ODC-PDDL-1.0
  path: http://opendatacommons.org/licenses/pddl/
  title: Open Data Commons Public Domain Dedication and License
sources:
- name: www.football-data.co.uk/
  path: https://www.football-data.co.uk/
  title: www.football-data.co.uk/
resources:
- name: season-2526
  path: season-2526.csv
  description: Match-by-match results and statistics for the 2025/26 EPL season (in progress).
  format: csv
  mediatype: text/csv
  encoding: ISO-8859-1
  dialect:
    delimiter: ","
    quoteChar: "\"
  schema:
    fields:
    - name: Date
      type: date
      format: "%d/%m/%y"
      description: Match Date (dd/mm/yy)
    - name: HomeTeam
      type: string
      format: default
      description: Home Team
    - name: AwayTeam
      type: string
      format: default
      description: Away Team
    - name: FTHG
      type: integer
      format: default
      description: Full Time Home Team Goals
    - name: FTAG
      type: integer
      format: default
      description: Full Time Away Team Goals
    - name: FTR
      type: string
      format: default
      description: Full Time Result (H=Home Win, D=Draw, A=Away Win)
    - name: HTHG
      type: integer
      format: default
      description: Half Time Home Team Goals
    - name: HTAG
      type: integer
      format: default
      description: Half Time Away Team Goals
    - name: HTR
      type: string
      format: default
      description: Half Time Result (H=Home Win, D=Draw, A=Away Win)
    - name: Referee
      type: string
      format: default
      description: Match Referee
    - name: HS
      type: integer
      format: default
      description: Home Team Shots
    - name: AS
      type: integer
      format: default
      description: Away Team Shots
    - name: HST
      type: integer
      format: default
      description: Home Team Shots on Target
    - name: AST
      type: integer
      format: default
      description: Away Team Shots on Target
    - name: HF
      type: integer
      format: default
      description: Home Team Fouls Committed
    - name: AF
      type: integer
      format: default
      description: Away Team Fouls Committed
    - name: HC
      type: integer
      format: default
      description: Home Team Corners
    - name: AC
      type: integer
      format: default
      description: Away Team Corners
    - name: HY
      type: integer
      format: default
      description: Home Team Yellow Cards
    - name: AY
      type: integer
      format: default
      description: Away Team Yellow Cards
    - name: HR
      type: integer
      format: default
      description: Home Team Red Cards
    - name: AR
      type: integer
      format: default
      description: Away Team Red Cards
    missingValues:
    - ''
